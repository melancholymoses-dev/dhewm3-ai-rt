name: Testbuild for Linux
run-name: testbuild_linux
on:
  workflow_dispatch:
concurrency:
  # Cancel concurrent workflows for the same PR or commit hash.
  group: ${{github.workflow}}-${{github.event_name == 'pull_request' && github.head_ref || github.sha}}
  cancel-in-progress: true
jobs:
  build_ubuntu_x86_64:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: ubuntu
    steps:
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libsdl2-dev libopenal-dev libcurl4-openssl-dev cmake ninja-build xz-utils 
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Checkout private Vulkan bundle
      uses: actions/checkout@v4
      with:
        repository: melancholymoses-dev/vulkan-lite
        token: ${{ secrets.VULKAN_LITE_TOKEN }}
        path: vulkan-lite
        fetch-depth: 1

    - name: Export Vulkan paths
      shell: bash
      run: |
        echo "VULKAN_SDK=$GITHUB_WORKSPACE/vulkan-lite/ubuntu" >> $GITHUB_ENV
        echo "$GITHUB_WORKSPACE/vulkan-lite/ubuntu/bin" >> $GITHUB_PATH        
    - name: Sanity check Vulkan toolchain
      run: |
        set -euo pipefail
        echo "VULKAN_SDK=$VULKAN_SDK"

        test -f "$VULKAN_SDK/include/vulkan/vulkan.h" || { echo "Missing Vulkan header: $VULKAN_SDK/include/vulkan/vulkan.h" >&2; exit 1; }
        test -f "$VULKAN_SDK/lib/libvulkan.so" || { echo "Missing Vulkan library: $VULKAN_SDK/lib/libvulkan.so" >&2; exit 1; }

        command -v glslc >/dev/null 2>&1 || { echo "glslc not found in PATH" >&2; exit 1; }
        glslc --version        
    - name: Build
      run: |
        mkdir build
        cd build
        cmake -G Ninja -DDEDICATED=ON ../neo/
        ninja
    - name: Create testbuild package
      run: |
        # Create release directory tree
        export PKGDIR="dhewm3-rt-linux-$(git rev-parse --short HEAD)"
        echo "pkgname=$PKGDIR" >> $GITHUB_ENV
        mkdir -p publish/$PKGDIR/base
        mkdir publish/$PKGDIR/d3xp
        # Copy release assets
        cd build
        cp dhewm3-rt dhewm3ded base.so d3xp.so ../publish/$PKGDIR/
        cd ..
        # Copy misc assets
        cp -r base/* publish/$PKGDIR/base/
        cp base/gamepad-d3xp.cfg publish/$PKGDIR/d3xp/
        # Copy built GL programs (SPIR-V shaders); fail packaging if they were not produced
        if [ ! -d build/glprogs ]; then
          echo "Error: required shader output directory build/glprogs is missing." >&2
          exit 1
        fi
        cp -r build/glprogs publish/$PKGDIR/base/
        cp COPYING.txt publish/$PKGDIR/
        # TODO: prepend to README that executables must be set executable? (and maybe commit, build, arch etc)
        echo "dhewm3-rt for 64bit (amd64 aka x86_64 aka x64) Linux, built $(date)" > publish/$PKGDIR/README.txt
        echo -e "from ${{ github.ref_name }} commit ${{ github.sha }}\n" >> publish/$PKGDIR/README.txt
        echo "!!! Note that you must set dhewm3-rt executable !!!" >> publish/$PKGDIR/README.txt
        echo "! In a Terminal, in this directory, run:" >> publish/$PKGDIR/README.txt
        echo "  chmod 755 dhewm3-rt dhewm3ded" >> publish/$PKGDIR/README.txt
        echo -e "(this is because of limitations in Githubs Workflow Actions)\n" >> publish/$PKGDIR/README.txt
        cat README.md >> publish/$PKGDIR/README.txt
        cp Changelog.md publish/$PKGDIR/Changelog.txt
        cp Configuration.md publish/$PKGDIR/Configuration.txt
    - name: Upload testbuild package
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.pkgname }}
        path: publish/
        if-no-files-found: error
